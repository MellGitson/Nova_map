services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: novamap_app
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "mysql://novamap:novamap@db:3306/novamap?serverVersion=8.0&charset=utf8mb4"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
      JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
      JWT_PASSPHRASE: "${JWT_PASSPHRASE}"
      APP_ENV: "${APP_ENV:-dev}"
      APP_SECRET: "${APP_SECRET}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - novamap

  db:
    image: mysql:8.0
    container_name: novamap_db
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root}"
      MYSQL_DATABASE: novamap
      MYSQL_USER: novamap
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-novamap}"
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "novamap", "-pnovamap"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novamap

  redis:
    image: redis:7-alpine
    container_name: novamap_redis
    command: redis-server --requirepass "${REDIS_PASSWORD:-redis}"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - novamap

volumes:
  db_data:
  redis_data:

networks:
  novamap:
    driver: bridge
